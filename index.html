<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打地鼠 · Whack-a-Mole</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;700;900&family=Fredoka+One&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Noto Sans SC',sans-serif;
  background:linear-gradient(180deg,#87CEEB 0%,#B5E5FF 38%,#5CB85C 38%,#3D8B3D 100%);
  min-height:100vh;overflow-x:hidden;user-select:none;
}

/* ===== SCREENS ===== */
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;align-items:center;justify-content:center;padding:20px;}

/* ===== TEACHER SETUP ===== */
#screen-teacher{background:linear-gradient(135deg,#e8f5e9 0%,#f1f8e9 50%,#e3f2fd 100%);}
.setup-card{
  background:#fff;border-radius:24px;padding:36px 40px;
  width:100%;max-width:560px;
  box-shadow:0 10px 48px rgba(0,0,0,0.13);
}
.setup-card h1{
  font-family:'ZCOOL XiaoWei',serif;font-size:2rem;color:#2E7D32;
  text-align:center;margin-bottom:4px;
}
.setup-subtitle{text-align:center;color:#888;font-size:0.88rem;margin-bottom:26px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-weight:700;color:#222;font-size:0.93rem;margin-bottom:5px;}
.form-group label .opt{font-weight:400;color:#bbb;font-size:0.8rem;margin-left:5px;}
.form-group small{display:block;color:#bbb;font-size:0.78rem;margin-bottom:5px;}
.form-group textarea{
  width:100%;border:2px solid #e0e0e0;border-radius:10px;padding:9px 12px;
  font-size:1.05rem;font-family:'Noto Sans SC',sans-serif;
  resize:vertical;min-height:66px;outline:none;color:#222;transition:border-color 0.2s;
}
.form-group textarea:focus{border-color:#43A047;}
.form-row{display:flex;gap:14px;margin-bottom:20px;}
.form-col{flex:1;}
.form-col label{display:block;font-weight:700;color:#222;font-size:0.93rem;margin-bottom:6px;}
.form-col select{
  width:100%;border:2px solid #e0e0e0;border-radius:10px;padding:9px 12px;
  font-size:0.9rem;font-family:'Noto Sans SC',sans-serif;
  outline:none;background:#fff;color:#222;transition:border-color 0.2s;
}
.form-col select:focus{border-color:#43A047;}
.btn-group{display:flex;gap:11px;}
.btn-preview,.btn-share{
  flex:1;border:none;border-radius:12px;padding:14px;
  font-size:0.97rem;font-family:'Noto Sans SC',sans-serif;font-weight:700;
  cursor:pointer;letter-spacing:0.5px;transition:transform 0.15s,box-shadow 0.15s;
}
.btn-preview{background:linear-gradient(135deg,#66BB6A,#2E7D32);color:#fff;box-shadow:0 4px 14px rgba(46,125,50,0.3);}
.btn-share{background:linear-gradient(135deg,#42A5F5,#1565C0);color:#fff;box-shadow:0 4px 14px rgba(21,101,192,0.28);}
.btn-preview:hover,.btn-share:hover{transform:translateY(-2px);}
.btn-preview:active,.btn-share:active{transform:scale(0.97);}

/* ===== STUDENT START ===== */
#screen-student-start{background:linear-gradient(135deg,#FFFDE7 0%,#FFF9C4 50%,#E8F5E9 100%);}
.student-card{
  background:rgba(255,255,255,0.97);border-radius:28px;
  padding:40px 36px;text-align:center;max-width:460px;width:100%;
  box-shadow:0 12px 48px rgba(0,0,0,0.11);
}
.student-mole-icon{font-size:4rem;margin-bottom:10px;display:block;}
.student-card h1{
  font-family:'Fredoka One',cursive;font-size:2.3rem;
  color:#2E7D32;margin-bottom:8px;letter-spacing:1px;
}
.student-card .desc{color:#666;font-size:0.92rem;margin-bottom:18px;line-height:1.65;}
.word-chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:20px;}
.word-chip{
  background:#E8F5E9;border:2px solid #A5D6A7;border-radius:18px;
  padding:4px 13px;font-size:1rem;font-weight:700;color:#2E7D32;
  font-family:'Noto Sans SC',sans-serif;
}
/* Difficulty */
.diff-section{margin-bottom:22px;}
.diff-label{
  font-family:'Fredoka One',cursive;font-size:1rem;color:#555;margin-bottom:10px;
}
.diff-btns{display:flex;gap:9px;justify-content:center;}
.diff-btn{
  border:2px solid #C8E6C9;border-radius:20px;padding:8px 18px;
  font-family:'Fredoka One',cursive;font-size:1rem;
  background:#F1F8E9;color:#388E3C;cursor:pointer;
  transition:all 0.18s;
}
.diff-btn.active{
  background:#2E7D32;color:#fff;border-color:#2E7D32;
  box-shadow:0 3px 12px rgba(46,125,50,0.32);transform:translateY(-1px);
}
.diff-btn:hover:not(.active){background:#E8F5E9;border-color:#A5D6A7;}
.btn-play{
  background:linear-gradient(135deg,#FF7043,#E53935);color:#fff;
  border:none;border-radius:50px;padding:15px 46px;
  font-family:'Fredoka One',cursive;font-size:1.45rem;
  cursor:pointer;letter-spacing:2px;
  box-shadow:0 6px 22px rgba(229,57,53,0.38);
  transition:transform 0.2s,box-shadow 0.2s;
}
.btn-play:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 10px 28px rgba(229,57,53,0.46);}
.btn-play:active{transform:scale(0.97);}

/* ===== GAME SCREEN ===== */
#screen-game{display:none;flex-direction:column;padding:0;align-items:stretch;min-height:100vh;}
#screen-game.active{display:flex;}

#hud{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 18px 8px;background:rgba(0,0,0,0.2);
  backdrop-filter:blur(6px);flex-wrap:wrap;gap:6px;position:relative;z-index:20;
}
.hud-item{
  background:rgba(255,255,255,0.18);border-radius:8px;
  padding:5px 12px;color:#fff;font-size:0.87rem;font-weight:700;
}
#hud-combo{transition:background 0.3s;}
#hud-back{
  background:rgba(255,255,255,0.25);border:none;border-radius:8px;
  padding:5px 12px;color:#fff;font-size:0.84rem;font-weight:700;
  cursor:pointer;display:none;
}
#hud-back:hover{background:rgba(255,255,255,0.4);}

#progress-bar-wrap{
  background:rgba(0,0,0,0.15);height:8px;margin:0 14px;border-radius:4px;overflow:hidden;
}
#progress-bar{height:100%;background:#FFD700;border-radius:4px;width:100%;transition:width 1s linear;}

#target-banner{
  background:rgba(255,255,255,0.96);border-radius:0 0 18px 18px;
  padding:11px 18px 13px;text-align:center;margin:0 14px;
  box-shadow:0 4px 18px rgba(0,0,0,0.11);
}
#target-label{font-size:0.8rem;color:#888;margin-bottom:3px;}
#target-row{display:flex;align-items:center;justify-content:center;gap:8px;}
#target-word{
  font-family:'ZCOOL XiaoWei',serif;font-size:2.6rem;
  color:#E53935;font-weight:900;letter-spacing:4px;
}
#target-word.pulse{animation:wordPulse 0.42s ease;}
@keyframes wordPulse{0%{transform:scale(1);}50%{transform:scale(1.2);}100%{transform:scale(1);}}
#speak-btn{
  background:none;border:none;cursor:pointer;font-size:1.25rem;
  transition:transform 0.2s;padding:4px;
}
#speak-btn:hover{transform:scale(1.2);}
#speech-wave{display:inline-flex;gap:3px;vertical-align:middle;height:17px;align-items:center;}
#speech-wave.hidden{display:none;}
#speech-wave span{
  display:block;width:3px;border-radius:2px;background:#E53935;
  animation:waveAnim 0.7s ease-in-out infinite;
}
#speech-wave span:nth-child(1){animation-delay:0s;height:6px;}
#speech-wave span:nth-child(2){animation-delay:.14s;height:13px;}
#speech-wave span:nth-child(3){animation-delay:.28s;height:9px;}
#speech-wave span:nth-child(4){animation-delay:.14s;height:13px;}
#speech-wave span:nth-child(5){animation-delay:0s;height:6px;}
@keyframes waveAnim{0%,100%{transform:scaleY(0.4);}50%{transform:scaleY(1);}}

#game-field{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  padding:14px 12px 8px;max-width:560px;margin:0 auto;width:100%;flex:1;
}

/* ===== HOLE + MOLE + SIGN ===== */
.hole-wrap{display:flex;flex-direction:column;align-items:center;}

/* hole-container handles ALL clicks */
.hole-container{
  position:relative;width:100%;aspect-ratio:1;max-width:160px;
  cursor:none;
}

.hole-bg{position:absolute;bottom:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}

/* ---- SIGN (paw level, no post) ---- */
/*
  Geometry: mole paws sit at ~38% from container-bottom (ground level).
  Sign-wrapper bottom: 36% → sign-board bottom edge at ground/paw level.
  Sign-board height ≈ 42px → sign-board top at 36% + 26% = 62% from bottom = 38% from top.
  Mole face sits at ~23% from top → face is ABOVE the sign. ✓
*/
.sign-wrapper{
  position:absolute;
  bottom:36%;          /* paw / ground level */
  left:50%;
  transform:translateX(-50%) translateY(260%);  /* hidden inside hole */
  opacity:0;
  z-index:8;
  display:flex;flex-direction:column;align-items:center;
  transition:transform 0.30s cubic-bezier(0.34,1.56,0.64,1), opacity 0.14s;
  pointer-events:none; /* hole-container handles click */
}
.sign-wrapper.up{
  transform:translateX(-50%) translateY(0);
  opacity:1;
}
.sign-wrapper.whacked{
  transform:translateX(-50%) translateY(220%) !important;
  opacity:0 !important;
  transition:transform 0.15s ease-in, opacity 0.09s !important;
}
.sign-board{
  background:#EFC060;
  border:3px solid #7A4A16;
  border-radius:8px;
  padding:5px 11px;
  min-width:52px;
  text-align:center;
  position:relative;overflow:hidden;
  box-shadow:2px 3px 8px rgba(0,0,0,0.28),
             inset 0 2px 0 rgba(255,255,255,0.46),
             inset 0 -2px 0 rgba(0,0,0,0.12);
}
/* wood grain lines */
.sign-board::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    180deg,transparent,transparent 9px,
    rgba(100,60,10,0.09) 9px,rgba(100,60,10,0.09) 10px
  );
  border-radius:6px;
}
/* top sheen */
.sign-board::after{
  content:'';position:absolute;top:0;left:0;right:0;height:38%;
  background:linear-gradient(180deg,rgba(255,255,255,0.32),transparent);
  border-radius:6px 6px 0 0;
}
.sign-word{
  font-family:'ZCOOL XiaoWei',serif;font-weight:700;
  color:#2A0E00;font-size:1.15rem;white-space:nowrap;
  position:relative;z-index:1;text-shadow:0 1px 0 rgba(255,255,255,0.38);
}

/* mole clip */
.mole-clip{
  position:absolute;bottom:17%;left:10%;right:10%;height:87%;
  overflow:hidden;pointer-events:none;z-index:3;
}
.mole-svg{
  position:absolute;bottom:0;width:100%;
  transform:translateY(100%);
  transition:transform 0.30s cubic-bezier(0.34,1.56,0.64,1);
  /* NO onclick — hole-container handles all clicks */
}
.mole-svg.up{transform:translateY(6%);}
.mole-svg.whacked{
  transform:translateY(112%) !important;
  transition:transform 0.15s ease-in !important;
}

/* hit feedback */
.hit-effect{
  position:absolute;top:8%;left:50%;transform:translateX(-50%);
  font-size:1.9rem;font-weight:900;pointer-events:none;z-index:20;opacity:0;
}
.hit-effect.correct{color:#FFD700;animation:hitPop 0.68s ease forwards;}
.hit-effect.wrong{color:#E53935;animation:hitPop 0.68s ease forwards;}
@keyframes hitPop{
  0%{opacity:1;transform:translateX(-50%) scale(0.4) translateY(0);}
  55%{opacity:1;transform:translateX(-50%) scale(1.4) translateY(-26px);}
  100%{opacity:0;transform:translateX(-50%) scale(1) translateY(-54px);}
}

/* ===== RESULT ===== */
#screen-result{
  position:fixed;inset:0;background:rgba(0,0,0,0.54);
  z-index:600;display:none;align-items:center;justify-content:center;
}
#screen-result.active{display:flex;}
.result-box{
  background:#fff;border-radius:28px;padding:38px 42px;
  text-align:center;max-width:370px;width:90%;
  box-shadow:0 16px 56px rgba(0,0,0,0.28);
}
.result-emoji{font-size:3.8rem;margin-bottom:9px;}
.result-title{font-family:'Fredoka One',cursive;font-size:1.9rem;color:#2E7D32;margin-bottom:8px;}
.result-stats{color:#666;margin-bottom:22px;font-size:0.93rem;line-height:1.95;}
.result-stats strong{color:#222;}
.btn-again,.btn-back-setup{
  display:block;width:100%;border:none;border-radius:14px;padding:13px;
  font-size:1.02rem;font-family:'Fredoka One',cursive;
  cursor:pointer;letter-spacing:1px;margin-bottom:9px;transition:transform 0.15s;
}
.btn-again{background:linear-gradient(135deg,#66BB6A,#2E7D32);color:#fff;box-shadow:0 4px 13px rgba(46,125,50,0.32);}
.btn-back-setup{background:#f1f1f1;color:#555;}
.btn-again:hover,.btn-back-setup:hover{transform:translateY(-2px);}

/* ===== SHARE MODAL ===== */
#modal-share{
  position:fixed;inset:0;background:rgba(0,0,0,0.52);
  z-index:800;display:none;align-items:center;justify-content:center;
}
#modal-share.open{display:flex;}
.share-box{
  background:#fff;border-radius:22px;padding:34px 34px 26px;
  max-width:490px;width:93%;box-shadow:0 16px 56px rgba(0,0,0,0.22);
}
.share-box h2{font-family:'ZCOOL XiaoWei',serif;font-size:1.45rem;color:#1565C0;margin-bottom:5px;}
.share-box p{color:#777;font-size:0.87rem;margin-bottom:16px;}
.share-url-row{display:flex;gap:8px;margin-bottom:7px;}
.share-url-row input{
  flex:1;border:2px solid #BBDEFB;border-radius:9px;
  padding:9px 12px;font-size:0.8rem;color:#333;
  background:#F5F9FF;outline:none;
}
.btn-copy{
  background:linear-gradient(135deg,#42A5F5,#1565C0);color:#fff;
  border:none;border-radius:9px;padding:9px 17px;
  font-size:0.88rem;font-weight:700;cursor:pointer;white-space:nowrap;
  transition:transform 0.14s;
}
.btn-copy:hover{transform:scale(1.04);}
//下面一行解决‘已复制链接’文字居中并放大2倍问题
.copy-confirm{font-size:1.58rem;color:#43A047;height:36px;margin-bottom:11px;text-align:center;}

.share-note{
  background:#FFF8E1;border:1px solid #FFE082;border-radius:8px;
  padding:9px 13px;font-size:0.79rem;color:#795548;margin-bottom:14px;
}
.btn-close-modal{
  width:100%;background:#f0f0f0;border:none;border-radius:9px;
  padding:10px;font-size:0.9rem;color:#666;cursor:pointer;transition:background 0.14s;
}
.btn-close-modal:hover{background:#e0e0e0;}

/* ===== MALLET CURSOR ===== */
//下面三行解决HUD区域仍显示锤子、按钮点不到问题
#hud{cursor:default!important;}
#hud-back{cursor:pointer!important;}
#speak-btn{cursor:pointer!important;}

#mallet-cursor{
  position:fixed;pointer-events:none;z-index:9999;
  width:58px;height:58px;
  transform:translate(-17px,-8px) rotate(-35deg);
  display:none;
}
#mallet-cursor.swing{transform:translate(-17px,-8px) rotate(22deg);}

/* ===== SCORE POPUP ===== */
.score-pop{
  position:fixed;font-family:'Fredoka One',cursive;font-size:1.65rem;
  pointer-events:none;z-index:500;animation:scoreFly 0.82s ease forwards;
}
@keyframes scoreFly{0%{opacity:1;transform:scale(1) translateY(0);}100%{opacity:0;transform:scale(1.38) translateY(-55px);}}

/* Stars */
.star-blast{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:19;}

/* Clouds */
.cloud{position:fixed;opacity:0.62;pointer-events:none;z-index:0;animation:cloudDrift linear infinite;}
@keyframes cloudDrift{from{transform:translateX(-180px);}to{transform:translateX(110vw);}}

@media(pointer:coarse){
  #mallet-cursor{display:none!important;}
  .hole-container{cursor:pointer!important;}
}

/* 👇 请把新样式代码粘贴在这里 👇 */
.word-chips {
    padding: 15px;
    gap: 15px;
}

.word-chips > * {
    font-size: 30px;
    padding: 12px 12px;
}
/* 👆 新样式代码结束 👆 */

</style>
</head>
<body>

<!-- Mallet cursor -->
<div id="mallet-cursor">
  <svg viewBox="0 0 60 60" fill="none">
    <rect x="26" y="20" width="9" height="36" rx="4" fill="#7D4A18"/>
    <rect x="28" y="20" width="5" height="36" rx="2.5" fill="#A06030" opacity="0.5"/>
    <rect x="7" y="3" width="46" height="23" rx="8" fill="#C62828"/>
    <rect x="7" y="3" width="46" height="10" rx="8" fill="#E53935"/>
    <rect x="7" y="15" width="46" height="11" fill="#B71C1C" opacity="0.35"/>
    <rect x="7" y="11" width="46" height="3" rx="1.5" fill="#ccc" opacity="0.45"/>
  </svg>
</div>

<!-- Clouds -->
<div class="cloud" style="top:16px;animation-duration:24s;animation-delay:0s">
  <svg width="110" height="46"><ellipse cx="55" cy="32" rx="46" ry="17" fill="white"/><ellipse cx="36" cy="26" rx="26" ry="15" fill="white"/><ellipse cx="75" cy="26" rx="20" ry="13" fill="white"/></svg>
</div>
<div class="cloud" style="top:52px;animation-duration:33s;animation-delay:-15s">
  <svg width="86" height="38"><ellipse cx="43" cy="27" rx="36" ry="13" fill="white"/><ellipse cx="28" cy="21" rx="20" ry="12" fill="white"/><ellipse cx="58" cy="21" rx="17" ry="10" fill="white"/></svg>
</div>

<!-- ===== SCREEN: TEACHER ===== -->
<div id="screen-teacher" class="screen active">
  <div class="setup-card">
    <h1>🐹 打地鼠</h1>
    <p class="setup-subtitle">汉语词语游戏 · 教师配置</p>

    <div class="form-group">
      <label>🎯 目标词语（必填）</label>
      <small>用空格、逗号或换行分隔，至少输入2个词语</small>
      <textarea id="inp-target" placeholder="例：苹果 香蕉 橙子 西瓜 草莓"></textarea>
    </div>

    <div class="form-group">
      <label>❌ 干扰词语 <span class="opt">（选填）</span></label>
      <small>留空则自动用其他目标词语作为干扰项</small>
      <textarea id="inp-distract" placeholder="例：汽车 火车 飞机"></textarea>
    </div>

    <div class="form-row">
      <div class="form-col">
        <label>⏱ 游戏时长</label>
        <select id="inp-time">
          <option value="30">30秒（快速练习）</option>
          <option value="60" selected>60秒（标准）</option>
          <option value="90">90秒（加长）</option>
          <option value="120">120秒（挑战）</option>
        </select>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn-preview" onclick="previewGame()">👁 预览游戏</button>
      <button class="btn-share" onclick="openShareModal()">🔗 生成分享链接</button>
    </div>
  </div>
</div>

<!-- ===== SCREEN: STUDENT START ===== -->
<div id="screen-student-start" class="screen">
  <div class="student-card">
    <span class="student-mole-icon">🐹</span>
    <h1>Whack-a-Mole!</h1>
    <div class="word-chips" id="student-word-chips"></div>

    <div class="diff-section">
      <p class="diff-label">Choose difficulty:</p>
      <div class="diff-btns">
        <button class="diff-btn" data-speed="2400" onclick="selectDiff(this)">🐢 Slow</button>
        <button class="diff-btn active" data-speed="1800" onclick="selectDiff(this)">🏃 Fast</button>
        <button class="diff-btn" data-speed="1300" onclick="selectDiff(this)">🚀 Hard</button>
      </div>
    </div>

    <button class="btn-play" onclick="studentPlay()">▶ &nbsp;Play Now!</button>
  </div>
</div>

<!-- ===== SCREEN: GAME ===== -->
<div id="screen-game" class="screen">
  <div id="hud">
    <div class="hud-item" id="hud-score">Score: 0</div>
    <div class="hud-item" id="hud-combo">Combo: 0</div>
    <div class="hud-item" id="hud-timer">⏱ 60</div>
    <div class="hud-item" id="hud-round">Round 1</div>
    <button id="hud-back" onclick="backToOrigin()">← Back</button>
  </div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="target-banner">
    <div id="target-row">
      <span id="target-word">—</span>
      <span id="speech-wave" class="hidden">
        <span></span><span></span><span></span><span></span><span></span>
      </span>
      <button id="speak-btn" onclick="speakTarget()" title="Hear the word again">🔊</button>
    </div>
  </div>
  <div id="game-field"></div>
</div>

<!-- ===== RESULT ===== -->
<div id="screen-result">
  <div class="result-box">
    <div class="result-emoji" id="res-emoji">🏆</div>
    <div class="result-title" id="res-title">Game Over!</div>
    <div class="result-stats" id="res-stats"></div>
    <button class="btn-again" onclick="playAgain()">🔄 Play Again</button>
    <button class="btn-back-setup" id="btn-back-setup" onclick="backToOrigin()">← Back</button>
  </div>
</div>

<!-- ===== SHARE MODAL ===== -->

<script>
// =============================================
// STATE
// =============================================
let cfg = { targetWords:[], distractWords:[], time:60, speed:1800 };
let score=0, combo=0, maxCombo=0, hits=0, misses=0;
let timeLeft=60, roundNum=1, currentTarget='';
let gameRunning=false;
let timerInterval=null;
let moleTimers=[];
// moleStates[i]: true = mole is up, false = down
let moleStates = new Array(9).fill(false);
let audioCtx=null;
let isPreviewMode=false;
let isStudentMode=false;

const HOLES=9;

// =============================================
// BOOT
// =============================================
window.addEventListener('load', () => {
  const params = new URLSearchParams(location.search);
  if (params.has('g')) {
    try {
      const raw = JSON.parse(decodeURIComponent(escape(atob(params.get('g')))));
      cfg.targetWords  = raw.t  || [];
      cfg.distractWords= (raw.d && raw.d.length>0) ? raw.d : raw.t || [];
      cfg.time  = raw.time  || 60;
      // speed will be chosen by student; store default from teacher (ignored now)
      cfg.speed = 1800;
      isStudentMode = true;
      // populate word chips
      const chips = document.getElementById('student-word-chips');
      chips.innerHTML = cfg.targetWords.map(w=>`<span class="word-chip">${w}</span>`).join('');
      showScreen('student-start');
    } catch(e) { showScreen('teacher'); }
  } else {
    showScreen('teacher');
  }

  // Cursor tracking
  document.addEventListener('mousemove', e => {
    const c = document.getElementById('mallet-cursor');
    if (c.style.display !== 'none') {
      c.style.left = e.clientX + 'px';
      c.style.top  = e.clientY + 'px';
    }
  });

  // Clicks outside holes → swing animation only
  document.addEventListener('click', e => {
    if (!gameRunning) return;
    // If click is inside a hole-container, the hole handler takes over
    if (e.target.closest('.hole-container')) return;
    swingCursor(); playSwing();
  });
});

function showScreen(name) {
  // Regular screens
  ['teacher','student-start'].forEach(s => {
    document.getElementById('screen-'+s).classList.toggle('active', s===name);
  });
  // Game screen special treatment
  const gs = document.getElementById('screen-game');
  gs.style.display = (name==='game') ? 'flex' : 'none';
  gs.classList.toggle('active', name==='game');
  // Cursor
  const cursor = document.getElementById('mallet-cursor');
  cursor.style.display = (name==='game') ? 'block' : 'none';
  document.body.style.cursor = (name==='game') ? 'none' : 'default';
}

// =============================================
// TEACHER HELPERS
// =============================================
function parseWords(str) {
  return str.split(/[\s,，\n]+/).map(w=>w.trim()).filter(w=>w.length>0);
}

function buildConfig() {
  const tWords = parseWords(document.getElementById('inp-target').value);
  if (tWords.length < 2) { alert('请至少输入2个目标词语！'); return null; }
  const dWords = parseWords(document.getElementById('inp-distract').value);
  return {
    targetWords:   tWords,
    distractWords: dWords.length>0 ? dWords : tWords,
    time:  parseInt(document.getElementById('inp-time').value),
    speed: 1800  // teacher preview uses default; student picks their own
  };
}

function previewGame() {
  const c = buildConfig(); if (!c) return;
  cfg = c;
  isPreviewMode = true;
  const chips = document.getElementById('student-word-chips');
  chips.innerHTML = cfg.targetWords.map(w => `<span class="word-chip">${w}</span>`).join('');
  showScreen('student-start');
}

function backToOrigin() {
  stopGame();
  document.getElementById('screen-result').style.display='none';
  if (isStudentMode) {
    showScreen('student-start');
  } else {
    isPreviewMode = false;
    showScreen('teacher');
  }
}

function openShareModal() {
  const c = buildConfig(); if (!c) return;
  // d: only encode if different from target words
  const dArr = c.distractWords.join(',') === c.targetWords.join(',') ? [] : c.distractWords;
  const raw = { t: c.targetWords, d: dArr, time: c.time };
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(raw))));
//下面1行解决分享链接打开是教师界面而非游戏界面问题
const url = location.href.split('?')[0] + '?g=' + encodeURIComponent(encoded);

  document.getElementById('share-url-input').value = url;
  document.getElementById('copy-confirm').textContent = '';
  document.getElementById('modal-share').classList.add('open');
}
function closeShareModal() { document.getElementById('modal-share').classList.remove('open'); }
function copyLink() {
  const inp = document.getElementById('share-url-input');
  navigator.clipboard.writeText(inp.value).then(ok, ok);
  function ok() {
    inp.select(); try { document.execCommand('copy'); } catch(e){}
    document.getElementById('copy-confirm').textContent = '✅ 链接已复制！';
    setTimeout(()=>document.getElementById('copy-confirm').textContent='', 2600);
  }
}

// =============================================
// STUDENT DIFFICULTY
// =============================================
function selectDiff(btn) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function studentPlay() {
  initAudio();
  unlockSpeech();
  const active = document.querySelector('.diff-btn.active');
  if (active) cfg.speed = parseInt(active.dataset.speed);
  if (isPreviewMode) {
    document.getElementById('hud-back').style.display = 'block';
    document.getElementById('btn-back-setup').textContent = '← Back to Setup';
  } else {
    isStudentMode = true;
    document.getElementById('hud-back').style.display = 'none';
    document.getElementById('btn-back-setup').textContent = '← Difficulty';
  }
  launchGame();
}

// =============================================
// LAUNCH + STOP
// =============================================
function launchGame() {
  score=0; combo=0; maxCombo=0; hits=0; misses=0;
  timeLeft = cfg.time; roundNum = 1; currentTarget = '';
  gameRunning = false;
  moleTimers.forEach(t=>clearTimeout(t)); moleTimers=[];
  moleStates = new Array(HOLES).fill(false);

  buildField();
  showScreen('game');
  document.getElementById('screen-result').style.display = 'none';
  updateHUD();
  startProgressBar();

  pickNewTarget();    // sets currentTarget and schedules speech
  gameRunning = true;
  startTimer();
  scheduleMoles();
}

function stopGame() {
  gameRunning = false;
  clearInterval(timerInterval);
  moleTimers.forEach(t=>clearTimeout(t)); moleTimers=[];
  for (let i=0; i<HOLES; i++) retractMole(i, true);
}

// =============================================
// BUILD FIELD
// =============================================
function buildField() {
  const f = document.getElementById('game-field');
  f.innerHTML = '';
  for (let i=0; i<HOLES; i++) {

        </svg>

        <!-- Sign board at paw/chest level (no post) -->

            <span class="sign-word" id="sign-word-${i}">词</span>
          </div>
        </div>

        <!-- Mole (NO onclick — parent hole-container handles it) -->
        <div class="mole-clip">
          <svg class="mole-svg" id="mole-${i}" viewBox="0 0 120 140"
               xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="60" cy="137" rx="36" ry="6"  fill="rgba(0,0,0,0.2)"/>
            <ellipse cx="60" cy="100" rx="37" ry="42" fill="#8B6914"/>
            <ellipse cx="60" cy="98"  rx="34" ry="40" fill="#C4902A"/>
            <ellipse cx="60" cy="110" rx="21" ry="25" fill="#E8C06A" opacity="0.5"/>
            <ellipse cx="27" cy="34"  rx="13" ry="11" fill="#C4902A"/>
            <ellipse cx="27" cy="34"  rx="8"  ry="7"  fill="#E8A0A8" opacity="0.85"/>
            <ellipse cx="93" cy="34"  rx="13" ry="11" fill="#C4902A"/>
            <ellipse cx="93" cy="34"  rx="8"  ry="7"  fill="#E8A0A8" opacity="0.85"/>
            <ellipse cx="60" cy="58"  rx="35" ry="33" fill="#D4A040"/>
            <ellipse cx="60" cy="55"  rx="33" ry="31" fill="#E0B050"/>
            <ellipse cx="44" cy="49"  rx="8"  ry="9"  fill="#1A1A1A"/>
            <ellipse cx="76" cy="49"  rx="8"  ry="9"  fill="#1A1A1A"/>
            <ellipse cx="46" cy="47"  rx="3"  ry="3.5" fill="#fff" opacity="0.7"/>
            <ellipse cx="78" cy="47"  rx="3"  ry="3.5" fill="#fff" opacity="0.7"/>
            <ellipse cx="47" cy="46"  rx="1.2" ry="1.4" fill="#fff" opacity="0.5"/>
            <ellipse cx="79" cy="46"  rx="1.2" ry="1.4" fill="#fff" opacity="0.5"/>
            <path d="M38 39 Q44 35 50 39" stroke="#7A5000" stroke-width="2.4" fill="none" stroke-linecap="round"/>
            <path d="M70 39 Q76 35 82 39" stroke="#7A5000" stroke-width="2.4" fill="none" stroke-linecap="round"/>
            <ellipse cx="60" cy="63"  rx="10" ry="7"  fill="#D2666A"/>
            <ellipse cx="58" cy="61"  rx="3"  ry="2"  fill="#fff" opacity="0.38"/>
            <path d="M53 69 Q60 76 67 69" stroke="#7A5000" stroke-width="2.1" fill="none" stroke-linecap="round"/>
            <line x1="21" y1="62" x2="47" y2="66" stroke="#7A5000" stroke-width="1.4" opacity="0.6"/>
            <line x1="21" y1="67" x2="47" y2="67" stroke="#7A5000" stroke-width="1.4" opacity="0.6"/>
            <line x1="73" y1="66" x2="99" y2="62" stroke="#7A5000" stroke-width="1.4" opacity="0.6"/>
            <line x1="73" y1="67" x2="99" y2="67" stroke="#7A5000" stroke-width="1.4" opacity="0.6"/>
            <ellipse cx="30" cy="116" rx="13" ry="9"  fill="#C4902A"/>
            <ellipse cx="90" cy="116" rx="13" ry="9"  fill="#C4902A"/>
            <ellipse cx="22" cy="122" rx="3.7" ry="2.9" fill="#A0714F"/>
            <ellipse cx="29" cy="124" rx="3.7" ry="2.9" fill="#A0714F"/>
            <ellipse cx="36" cy="123" rx="3.7" ry="2.9" fill="#A0714F"/>
            <ellipse cx="84" cy="122" rx="3.7" ry="2.9" fill="#A0714F"/>
            <ellipse cx="91" cy="124" rx="3.7" ry="2.9" fill="#A0714F"/>
            <ellipse cx="98" cy="123" rx="3.7" ry="2.9" fill="#A0714F"/>
          </svg>
        </div>

        <div class="hit-effect" id="hit-${i}"></div>
      </div>`;
    f.appendChild(wrap);
  }
}

// =============================================
// HOLE CLICK HANDLER  ← single source of truth
// All clicks (mole body, sign board, empty hole)
// flow through here via DOM bubbling.
// =============================================
function handleHoleClick(idx, event) {
  event.stopPropagation(); // prevent document-level swing handler
  if (!gameRunning) return;

  swingCursor();
  initAudio();

  if (!moleStates[idx]) {
    // Clicked an empty hole → swing + miss sfx
    playSwing();
    return;
  }

  // === Mole is up: process the hit ===
  const mole    = document.getElementById('mole-'     + idx);
  const sign    = document.getElementById('sign-'     + idx);
  const hitEl   = document.getElementById('hit-'      + idx);
  const word    = mole.dataset.word;

  // Lock this hole immediately
  moleStates[idx] = false;
  mole.classList.add('whacked');  mole.classList.remove('up');
  sign.classList.add('whacked');  sign.classList.remove('up');

  hitEl.classList.remove('correct','wrong');
  void hitEl.offsetWidth; // force reflow

  if (word === currentTarget) {
    const pts = 10 + combo * 2;
    score += pts; combo++; hits++;
    if (combo > maxCombo) maxCombo = combo;
    playHit();
    if (combo >= 3) playSuccess();
    hitEl.textContent = combo >= 3 ? `+${pts}🔥` : `+${pts}`;
    hitEl.classList.add('correct');
    showScorePop(event, `+${pts}`, '#FFD700');
    burstStars(idx);
    pickNewTarget();
  } else {
    score = Math.max(0, score - 5);
    combo = 0; misses++;
    playMiss();
    hitEl.textContent = '✗';
    hitEl.classList.add('wrong');
    showScorePop(event, '-5', '#E53935');
  }
  updateHUD();
}

// =============================================
// TIMER
// =============================================
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    updateHUD();
    if (timeLeft <= 0) endGame();
  }, 1000);
}

function startProgressBar() {
  const pb = document.getElementById('progress-bar');
  pb.style.transition = 'none'; pb.style.width = '100%';
  setTimeout(() => {
    pb.style.transition = `width ${cfg.time}s linear`;
    pb.style.width = '0%';
  }, 60);
}

// =============================================
// TARGET WORD
// =============================================
function pickNewTarget() {
  const prev = currentTarget;
  let pool = cfg.targetWords.filter(w => w !== prev);
  if (!pool.length) pool = cfg.targetWords;
  currentTarget = pool[Math.floor(Math.random() * pool.length)];

  const tw = document.getElementById('target-word');
  tw.textContent = currentTarget;
  tw.classList.remove('pulse'); void tw.offsetWidth; tw.classList.add('pulse');
  document.getElementById('hud-round').textContent = 'Round ' + roundNum++;

  // Speak — small delay so screen transition completes first
  setTimeout(() => speakWord(currentTarget), 120);
}

function speakTarget() { if (currentTarget) speakWord(currentTarget); }

function speakWord(word) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'zh-CN'; u.rate = 0.82; u.pitch = 1.1;
  const wave = document.getElementById('speech-wave');
  wave.classList.remove('hidden');
  u.onend = u.onerror = () => wave.classList.add('hidden');
  speechSynthesis.speak(u);
}

// Called on the Play Now button click to unlock speech synthesis
// (browser requires a user gesture before TTS will work)
function unlockSpeech() {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(' ');
  u.volume = 0; u.lang = 'zh-CN';
  speechSynthesis.speak(u);
  speechSynthesis.cancel();
}

// =============================================
// MOLE SCHEDULING
// =============================================
function scheduleMoles() {
  if (!gameRunning) return;
  const count = 2 + Math.floor(Math.random() * 3);
  const avail = [];
  for (let i=0; i<HOLES; i++) if (!moleStates[i]) avail.push(i);
  if (avail.length === 0) {
    moleTimers.push(setTimeout(scheduleMoles, 300)); return;
  }
  const chosen = shuffle(avail).slice(0, Math.min(count, avail.length));
  const pool   = buildWordPool(chosen.length);

  chosen.forEach((idx, i) => {
    const t = setTimeout(() => { if (gameRunning) popMole(idx, pool[i]); }, i * 130);
    moleTimers.push(t);
  });

  const next = cfg.speed * 0.55 + Math.random() * cfg.speed * 0.45;
  moleTimers.push(setTimeout(scheduleMoles, next));
}

function buildWordPool(count) {
  const pool = [];
  const includeTarget = Math.random() < 0.65;
  const distractors = cfg.distractWords.filter(w => w !== currentTarget);
  const fallback    = cfg.targetWords.filter(w => w !== currentTarget);
  const pickD = () => {
    if (distractors.length > 0) return distractors[Math.floor(Math.random()*distractors.length)];
    if (fallback.length > 0)    return fallback[Math.floor(Math.random()*fallback.length)];
    return currentTarget;
  };
  if (includeTarget) {
    pool.push(currentTarget);
    for (let i=1; i<count; i++) pool.push(pickD());
  } else {
    for (let i=0; i<count; i++) pool.push(pickD());
  }
  return shuffle(pool);
}

function popMole(idx, word) {
  if (moleStates[idx]) return; // already up
  moleStates[idx] = true;

  const mole = document.getElementById('mole-'     + idx);
  const sign = document.getElementById('sign-'     + idx);
  const sw   = document.getElementById('sign-word-'+ idx);

  // Store the word on the mole element (single source of truth for hit detection)
  mole.dataset.word = word;
  sw.textContent    = word;

  // Font size scales with word length
  sw.style.fontSize = word.length<=2 ? '1.25rem'
                    : word.length<=3 ? '1.1rem'
                    : word.length<=4 ? '0.96rem' : '0.8rem';

  mole.classList.remove('whacked'); sign.classList.remove('whacked');
  mole.classList.add('up');         sign.classList.add('up');

  // Auto-retract
  const t = setTimeout(() => { if (moleStates[idx]) retractMole(idx, false); }, cfg.speed);
  moleTimers.push(t);
}

function retractMole(idx, instant) {
  moleStates[idx] = false;
  const mole = document.getElementById('mole-'+ idx);
  const sign = document.getElementById('sign-'+ idx);
  if (!mole || !sign) return;
  mole.classList.remove('up', 'whacked');
  sign.classList.remove('up', 'whacked');
}

// =============================================
// HUD
// =============================================
function updateHUD() {
  document.getElementById('hud-score').textContent = 'Score: ' + score;
  document.getElementById('hud-timer').textContent = '⏱ '    + timeLeft;
  const ce = document.getElementById('hud-combo');
  ce.textContent = combo>=3 ? `🔥 Combo: ${combo}` : `Combo: ${combo}`;
  ce.style.background = combo>=3 ? 'rgba(255,160,0,0.5)' : 'rgba(255,255,255,0.18)';
}

// =============================================
// END GAME
// =============================================
function endGame() {
  stopGame();
  setTimeout(showResult, 650);
}

function showResult() {
  const total = hits + misses;
  const acc   = total > 0 ? Math.round(hits/total*100) : 0;
  let emoji='💪', title='Keep Trying!';
  if      (score>=200){ emoji='🏆'; title='Perfect!';     }
  else if (score>=120){ emoji='🥇'; title='Excellent!';   }
  else if (score>=60) { emoji='👍'; title='Well Done!';   }
  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-stats').innerHTML =
    `Final Score: <strong>${score}</strong> pts<br>`+
    `Correct: <strong>${hits}</strong>&nbsp;|&nbsp;Wrong: <strong>${misses}</strong><br>`+
    `Accuracy: <strong>${acc}%</strong>&nbsp;|&nbsp;Best Combo: <strong>${maxCombo}</strong>`;
  document.getElementById('screen-result').style.display = 'flex';
}

function playAgain() {
  document.getElementById('screen-result').style.display = 'none';
  launchGame();
}

// =============================================
// AUDIO
// =============================================
function initAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
}

function playHit() {
  if (!audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type='square';
  o.frequency.setValueAtTime(220, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime+0.14);
  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.2);
  o.start(); o.stop(audioCtx.currentTime+0.2);
  // thud
  const buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*0.12),audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*0.03));
  const s=audioCtx.createBufferSource(), g2=audioCtx.createGain();
  s.buffer=buf; s.connect(g2); g2.connect(audioCtx.destination);
  g2.gain.setValueAtTime(0.44, audioCtx.currentTime);
  g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.12);
  s.start();
}

function playMiss() {
  if (!audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type='sawtooth';
  o.frequency.setValueAtTime(280, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(130, audioCtx.currentTime+0.22);
  g.gain.setValueAtTime(0.17, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.22);
  o.start(); o.stop(audioCtx.currentTime+0.22);
}

function playSuccess() {
  if (!audioCtx) return;
  [523,659,784,1047].forEach((f,i)=>{
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination); o.type='sine'; o.frequency.value=f;
    const t=audioCtx.currentTime+i*0.1;
    g.gain.setValueAtTime(0.27,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
    o.start(t); o.stop(t+0.28);
  });
}

function playSwing() {
  if (!audioCtx) return;
  const buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*0.06),audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*0.014));
  const s=audioCtx.createBufferSource(), g=audioCtx.createGain();
  s.buffer=buf; s.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(0.11, audioCtx.currentTime);
  s.start();
}

// =============================================
// CURSOR
// =============================================
function swingCursor() {
  const c = document.getElementById('mallet-cursor');
  c.classList.add('swing');
  setTimeout(() => c.classList.remove('swing'), 200);
}

// =============================================
// SCORE POP + STARS
// =============================================
function showScorePop(event, text, color) {
  const p = document.createElement('div');
  p.className='score-pop'; p.textContent=text; p.style.color=color;
  p.style.left=(event.clientX-20)+'px'; p.style.top=(event.clientY-20)+'px';
  document.body.appendChild(p);
  setTimeout(()=>p.remove(), 850);
}

function burstStars(idx) {
  const h = document.getElementById('hole-'+idx);
  const d = document.createElement('div');
  d.className='star-blast';
  d.innerHTML = ['⭐','✨','💥','⚡'].map(s=>
    `<span style="position:absolute;font-size:1.25rem;
      left:${12+Math.random()*68}%;top:${4+Math.random()*48}%;
      animation:hitPop 0.63s ease forwards;
      animation-delay:${Math.random()*0.07}s">${s}</span>`
  ).join('');
  h.appendChild(d);
  setTimeout(()=>d.remove(), 680);
}

// =============================================
// UTILS
// =============================================
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
